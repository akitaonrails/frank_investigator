  pages:
    terms:
      title: "Terms of Use — Frank Investigator"
      heading: "Terms of Use and Disclaimer"
      link_text: "Terms of use"
      nature_heading: "Nature of this service"
      nature_body: "Frank Investigator is an automated analytical tool that examines publicly available news articles using artificial intelligence, natural language processing, and web search. It extracts factual claims from articles, searches for corroborating and contradicting evidence, analyzes rhetorical structure, identifies contextual omissions, and detects patterns of coordinated media coverage. Its reports are generated algorithmically and are intended to assist readers in forming their own informed judgments."
      not_heading: "What this service is NOT"
      not_items:
        - "It is not a fact-checking authority. No report produced by this system constitutes a definitive determination of truth or falsehood. The system identifies patterns, flags potential issues, and presents counter-evidence — the reader must draw their own conclusions."
        - "It is not a content moderation or censorship tool. The analysis of an article does not imply that the article should be removed, sanctioned, or suppressed. All analyzed content remains the intellectual property and editorial responsibility of its original publishers."
        - "It is not an attack on journalism or any specific news outlet. The identification of rhetorical patterns, contextual gaps, or coordination signals in an article is a form of media analysis, not an accusation of bad faith. Legitimate journalism routinely contains editorial choices that this system may flag — such findings reflect the nature of editorial work, not malice."
        - "It is not a government-sanctioned or officially endorsed fact-checking agency. This is an independent, open-source project with no institutional affiliation, no regulatory authority, and no power to compel or penalize."
      methodology_heading: "Methodology"
      methodology_body: "Each investigation runs a multi-step pipeline that includes: article fetching via headless browser, claim extraction, headline analysis, claim assessment against web evidence, source misrepresentation detection, temporal and statistical analysis, quotation verification, authority chain analysis, rhetorical fallacy detection, contextual gap analysis with counter-evidence search, coordinated narrative detection across outlets, emotional manipulation scoring, and a final executive summary. The system uses large language models (LLMs) as analytical tools — not as sources of truth. LLM outputs are constrained by structured schemas and cross-referenced against publicly retrievable evidence."
      limitations_heading: "Limitations and known constraints"
      limitations_items:
        - "Automated analysis is inherently imperfect. The system may produce false positives (flagging legitimate editorial choices as problematic) or false negatives (missing genuine manipulation). Scores are probabilistic assessments, not certainties."
        - "The system analyzes articles in isolation or against publicly available coverage. It does not have access to unpublished sources, confidential documents, or the editorial intent behind any article."
        - "LLM-generated analysis reflects the capabilities and limitations of the models used. Different models may produce different assessments of the same article."
        - "Web search results used as counter-evidence are themselves subject to the same biases and limitations as any online content."
        - "The scoring system is calibrated to distinguish normal editorial imperfections from deliberate manipulation, but calibration is an ongoing process and may not be perfect in all cases."
      purpose_heading: "Intended purpose"
      purpose_body: "The sole purpose of this system is to encourage critical reading. By surfacing what an article says, what it omits, how it frames its narrative, and how its coverage compares to other outlets, the system aims to give readers the tools to think more deeply about what they read. It does not tell readers what to think — it shows them what questions to ask."
      sharing_heading: "Sharing and use of reports"
      sharing_body: "You are free to share the link to any report generated by this system. However, you may not copy, extract, or reproduce individual sections, scores, or excerpts from a report to present them outside the context of the full analysis. Reports are designed to be read as a whole — each finding is qualified by the others, and isolating a single score or statement from the rest of the analysis misrepresents the system's output. If you wish to reference a report, share the full URL so that readers may review the complete analysis and draw their own conclusions."
      liability_heading: "Limitation of liability"
      liability_body: "This service is provided 'as is' without warranties of any kind, express or implied. The operator of this service does not guarantee the accuracy, completeness, or reliability of any analysis produced. The operator shall not be held liable for any decisions made or actions taken based on the information provided by this system. Users are solely responsible for their own interpretation and use of the reports generated."
      opensource_heading: "Open source"
      opensource_body_html: 'The complete source code of Frank Investigator is publicly available under the <a href="https://github.com/akitaonrails/frank_investigator" target="_blank" rel="noopener" class="underline hover:text-ink">GNU Affero General Public License v3.0</a>. Anyone may inspect, audit, reproduce, or improve the analysis methodology.'

    methodology:
      title: "Methodology — Frank Investigator"
      heading: "How to read a report"
      link_text: "How to read a report"
      overview_heading: "Overview"
      overview_body: "Each investigation runs a 15-step automated pipeline that fetches the article, extracts factual claims, searches for evidence, and applies multiple analysis layers. The report presents findings from most important (top) to most detailed (bottom). No single score tells the full story — read the report as a whole."
      top_scores_heading: "Top-level scores"
      credibility_heading: "Credibility"
      credibility_body: "A composite score (0-100%) derived from ALL analysis signals. It blends the worst finding (60% weight) with the average of significant findings (40% weight). A single severe issue (e.g., high coordination) drags credibility down even if other scores are clean. Minor imperfections below the noise threshold (25%) are ignored — every article has some."
      coordination_heading: "Coordination"
      coordination_body: "Measures whether this article participates in a coordinated narrative campaign. The system searches the web for other articles covering the same event, extracts narrative fingerprints (who is blamed, who is defended, what is omitted), and compares them. High coordination (>50%) means multiple outlets share the same framing AND the same omissions — a strong signal of shared narrative sources rather than independent journalism. Normal coverage of a major event scores low (0-20%)."
      completeness_heading: "Completeness"
      completeness_body: "Measures how much relevant context the article addresses. The system identifies critical questions the article doesn't answer — scope mismatches (citing foreign data for local conclusions), missing counter-evidence, benefit pass-through gaps, and reversal framing (presenting partial rollbacks as new benefits). A score below 50% means the article omits context that could change the reader's conclusion."
      summary_heading: "Investigation summary"
      summary_body: "The executive summary synthesizes ALL analysis findings into a conclusion, strengths, weaknesses, and an overall quality rating. When related investigations exist, a red warning box shows additional facts this article omits that were found in other articles covering the same event."
      event_context_heading: "Event context from related investigations"
      event_context_body: "When multiple articles about the same event have been investigated, the system builds a composite timeline combining facts from ALL articles. It then shows which facts each article includes and which it omits. Critical omissions — facts present in at least one article but missing from the majority — are highlighted. This section grows richer as more articles about the same event are investigated, regardless of submission order."
      headline_heading: "Headline analysis"
      headline_body: "Compares the headline against the article body to detect three patterns: sensationalism (headline makes definitive claims the body doesn't support), selective positive framing (headline highlights the positive while body contains reversals and backlash), and euphemistic downplaying (headline uses soft language while body describes severe events). A green border means only low headline-body divergence; amber means moderate divergence; red means significant manipulation. Even with a green border, the other analyses may still surface important problems."
      coordinated_narrative_heading: "Coordinated narrative analysis"
      coordinated_narrative_body: "The full coordination analysis showing: convergent framing (do multiple outlets use the same blame/defense structure?), convergent omissions (do they all omit the same counter-evidence?), causal chain erasure (do they all skip the same links in the event's causal chain?), and euphemistic convergence (do they all use the same softening language?). Also lists the related articles found via web search."
      emotional_heading: "Emotional manipulation"
      emotional_body: "Measures emotional temperature (how emotionally charged the writing is) against evidence density (ratio of evidence to emotional appeals). High emotion with high evidence is legitimate passionate journalism — not manipulation. High emotion with low evidence and other deception signals indicates manipulation. Shows dominant emotions detected and contributing factors."
      detailed_heading: "Detailed analysis sections"
      detailed_intro: "These sections show green (no issues) or amber (findings) dots. Click to expand. They are collapsed by default when no significant issues were found."
      source_misrep_heading: "Source misrepresentation"
      source_misrep_body: "Checks whether the article accurately represents its cited sources. Detects cherry-picking, exaggeration, context stripping, fabrication, and scope inflation. Each cited source is compared against its actual content (when fetchable). A score of 0 means sources are accurately represented."
      temporal_heading: "Temporal manipulation"
      temporal_body: "Detects old data presented as current, timeline mixing (juxtaposing events from different periods to imply causation), implicit recency (present tense for past events), and selective timeframes (choosing dates that exaggerate trends). Temporal integrity of 100% means no issues."
      statistical_heading: "Statistical deception"
      statistical_body: "Detects cherry-picked baselines, relative vs absolute percentage confusion, survivorship bias, scale manipulation, denominator games, and missing base numbers. Shows corrective context explaining what honest presentation would look like. Statistical integrity of 100% means no issues."
      quotation_heading: "Selective quotation"
      quotation_body: "Checks whether quotes are used faithfully or taken out of context. Detects truncation (cutting quotes to change meaning), reversal (using quotes to imply the opposite), and fabrication. When source articles are available, shows the full context alongside the truncated quote."
      authority_heading: "Authority laundering"
      authority_body: "Analyzes the citation chain to detect vertical authority inflation — when a low-authority source (blog, social media) gets cited by progressively larger outlets without new evidence being added, making it appear authoritative. Traces the chain from origin to the article being analyzed."
      rhetorical_heading: "Rhetorical analysis"
      rhetorical_body: "Detects 16 logical fallacies in the article's argumentative structure, including classical fallacies and six patterns derived from Schopenhauer's 38 Stratagems ('The Art of Being Right', 1831). The 38 stratagems catalogue debate tactics for winning arguments regardless of truth — many apply directly to how news articles frame narratives. Of the 38, 19 are covered by this system (6 as dedicated fallacy types, 13 via other analyzers); the remaining 19 are debate-specific tactics (interruption, question barrage, provocation) that don't reliably apply to written news. The 16 detected types are: bait-and-pivot, appeal to authority, strawman, false cause, anecdote over data, loaded language, false dilemma, slippery slope, ad hominem, cherry picking, equivocation (#2 — same term with different meanings), odious categorization (#32 — dismissive labels), twisted conclusion (#9 — correct data, wrong conclusion), paradox framing (#13 — making dissent absurd), false admission (#11 — allegation silently becomes fact), and faulty proof exploitation (#37 — attacking one weak argument to dismiss an entire position)."
      contextual_gaps_heading: "Contextual gap analysis"
      contextual_gaps_body: "Identifies what the article doesn't address — questions a well-informed reader would ask. Detects scope mismatches, missing counter-evidence, theoretical vs practical gaps, distributional blindness, causal chain gaps, historical amnesia, reversal framing, benefit pass-through gaps, and selective attribution. For each gap, the system searches the web for counter-evidence."
      quality_heading: "Quality ratings"
      quality_items:
        - "Strong (green): Claims are well-sourced, relevant context is addressed, no significant deception signals. Minor imperfections are acceptable."
        - "Mixed (amber): Some claims are supported but notable gaps exist or moderate deception signals were found. The article is not deliberately misleading but has significant shortcomings."
        - "Weak (red): Deliberate manipulation detected — major contextual omissions, systematic source misrepresentation, coordinated narrative campaign, or multiple high-severity deception signals."
        - "Insufficient (grey): Not enough evidence to assess meaningfully — too few checkable claims or the article is primarily opinion/editorial."
      calibration_heading: "Calibration"
      calibration_body: "The scoring system is calibrated to distinguish normal editorial imperfections from deliberate manipulation. A score of 0.2 from five different analyzers does not equal one score of 1.0 — it means the article has normal imperfections. Only signals above the noise threshold (25%) are counted as significant. The system errs on the side of caution: it would rather call a manipulative article 'mixed' than falsely accuse an honest article of manipulation."

