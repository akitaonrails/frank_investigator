default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: fetch
      threads: <%= ENV.fetch("FETCH_JOB_THREADS", 1) %>
      processes: <%= ENV.fetch("FETCH_JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    - queues:
        - default
        - solid_queue_recurring
      threads: <%= ENV.fetch("DEFAULT_JOB_THREADS", 2) %>
      processes: <%= ENV.fetch("DEFAULT_JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
