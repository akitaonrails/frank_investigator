production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  smoke_check:
    class: Monitoring::SmokeCheckJob
    queue: default
    schedule: every 6 hours
  purge_old_errors:
    command: "ErrorReport.purge_old"
    schedule: at 3am every day
  detect_stale_claims:
    class: Claims::DetectStalenessJob
    queue: default
    schedule: every 12 hours
  reassess_stale_claims:
    class: Claims::ReassessStaleClaimsJob
    queue: default
    schedule: at 4am every day
  detect_source_corrections:
    class: Claims::DetectSourceCorrectionsJob
    queue: default
    schedule: every 12 hours
