# Kamal deploy configuration for Frank Investigator
# Shares server with makita-newsletter and marvin-bot
service: frank-investigator

image: ghcr.io/akitaonrails/frank-investigator

servers:
  web:
    hosts:
      - 107.170.70.49
    options:
      network: makita-network
      shm-size: 512m
    env:
      clear:
        WEB_CONCURRENCY: 0
        SOLID_QUEUE_IN_PUMA: false
  worker:
    hosts:
      - 107.170.70.49
    cmd: "./bin/jobs start"
    proxy: false
    options:
      network: makita-network
      shm-size: 512m
    env:
      clear:
        FETCH_JOB_THREADS: 1
        FETCH_JOB_CONCURRENCY: 1
        DEFAULT_JOB_THREADS: 2
        DEFAULT_JOB_CONCURRENCY: 1

proxy:
  ssl: true
  host: investigator.themakitachronicles.com
  healthcheck:
    path: /up
    interval: 3
    timeout: 90

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: true
    FRANK_INVESTIGATOR_LOCALE: pt-BR
    CHROMIUM_PATH: /usr/bin/chromium
    LLM_TIMEOUT_SECONDS: 120
    FRANK_INVESTIGATOR_MAX_LINK_DEPTH: 1
    FRANK_INVESTIGATOR_VECTOR_SEARCH_ENABLED: true
    FRANK_INVESTIGATOR_EMBEDDING_PROVIDER: openrouter
    FRANK_INVESTIGATOR_EMBEDDING_MODEL: openai/text-embedding-3-small
    FRANK_INVESTIGATOR_EMBEDDING_DIMENSIONS: 1536
    RAILS_MAX_THREADS: 5
    JOBS_AUTH_USER: admin
  secret:
    - RAILS_MASTER_KEY
    - OPENROUTER_API_KEY
    - OPENAI_API_KEY
    - FRANK_INVESTIGATOR_OPENROUTER_MODELS
    # Default: anthropic/claude-sonnet-4-6
    - FRANK_AUTH_SECRET
    - ALLOWED_HOST
    - JOBS_AUTH_PASSWORD
    - GOOGLE_ANALYTICS_ID

aliases:
  console: app exec --interactive --reuse -r web "bin/rails console"
  shell: app exec --interactive --reuse -r web "bash"
  logs: app logs -r web -f
  worker_shell: app exec --interactive --reuse -r worker "bash"
  worker_logs: app logs -r worker -f

volumes:
  - "frank_investigator_storage:/rails/storage"
  - "/opt/makita/content:/content"

asset_path: /rails/public/assets

builder:
  arch: amd64
  context: .
